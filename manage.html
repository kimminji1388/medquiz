<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Question Set Manager - MedQuiz Locker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">MedQuiz Locker</p>
      <h1>Question Set Manager</h1>
      <p class="subtitle">Control which imported exams appear in the quiz.</p>
    </div>
    <a class="header-link" href="index.html">Back to quiz</a>
  </header>

  <main class="manager-shell">
    <section class="manager-toolbar" aria-label="Question set controls">
      <div id="managerStats" class="manager-stats">Loading question sets...</div>
      <div class="manager-actions">
        <button id="showAllBtn" class="secondary" type="button">Show all</button>
        <button id="downloadSetsBtn" type="button">Download settings</button>
      </div>
    </section>

    <section aria-labelledby="setsHeading">
      <h2 id="setsHeading">Question sets</h2>
      <div id="setList" class="set-list"></div>
    </section>

    <div id="managerStatus" class="feedback" hidden></div>
  </main>

  <script src="manage.js"></script>
</body>
</html>
